name: Build

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go build -o fzt${{ matrix.ext }} .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
      - uses: actions/upload-artifact@v4
        with:
          name: fzt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: fzt${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir release
          cp artifacts/fzt-windows-amd64/fzt.exe release/fzt-windows-amd64.exe
          cp artifacts/fzt-linux-amd64/fzt release/fzt-linux-amd64
          cp artifacts/fzt-darwin-arm64/fzt release/fzt-darwin-arm64
      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh release list -R ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName // empty')
          if [ -z "$latest" ]; then
            next="v0.1.0"
          else
            patch=$(echo "$latest" | sed 's/v[0-9]*\.[0-9]*\.//')
            next="v0.1.$((patch + 1))"
          fi
          gh release create "$next" release/* \
            -R ${{ github.repository }} \
            --title "$next" \
            --notes "$(git log --oneline -1)"
